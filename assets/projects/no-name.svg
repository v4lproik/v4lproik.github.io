<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">no-name preview</title>
  <desc id="desc">A stylized internal pentest login-surface scanner report.</desc>
  <rect width="960" height="600" rx="34" fill="#081018"/>
  <rect x="54" y="54" width="852" height="492" rx="24" fill="#0c1926" stroke="#26384d"/>
  <text x="90" y="112" fill="#ffb36b" font-family="Manrope, Arial" font-size="28" font-weight="800">auth surface scan</text>
  <rect x="90" y="152" width="780" height="78" rx="16" fill="#10243a"/>
  <text x="118" y="184" fill="#dce7f0" font-family="Menlo, monospace" font-size="17">POST /login  form: email,password</text>
  <text x="118" y="210" fill="#9db1c1" font-family="Menlo, monospace" font-size="15">csrf=true  mfa=unknown  redirect=/dashboard</text>
  <rect x="90" y="258" width="380" height="212" rx="18" fill="#101f31"/>
  <rect x="500" y="258" width="370" height="212" rx="18" fill="#101f31"/>
  <text x="122" y="304" fill="#74a8ff" font-family="Manrope, Arial" font-size="21" font-weight="700">credential paths</text>
  <text x="532" y="304" fill="#74a8ff" font-family="Manrope, Arial" font-size="21" font-weight="700">report</text>
  <g fill="#dce7f0" font-family="Menlo, monospace" font-size="16">
    <text x="122" y="352">basic: blocked</text>
    <text x="122" y="386">oauth: present</text>
    <text x="122" y="420">reset: weak signal</text>
    <text x="532" y="352">findings: 4</text>
    <text x="532" y="386">priority: review</text>
    <text x="532" y="420">export: markdown</text>
  </g>
</svg>
